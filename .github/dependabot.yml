version: 2
updates:
  # npm dependencies (root package.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    groups:
      # Roll safe patch/minor updates into a single PR per week
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions versions (pinned in workflows)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
      include: "scope"
